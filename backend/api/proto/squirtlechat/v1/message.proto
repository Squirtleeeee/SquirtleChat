syntax = "proto3";

package squirtlechat.v1;

import "squirtlechat/v1/common.proto";

option go_package = "squirtlechat/api/gen/squirtlechat/v1;squirtlechatv1";

service MessageService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);
  rpc MarkRead(MarkReadRequest) returns (Empty);
}

message ChatMessage {
  int64 msg_id = 1;
  string conversation_id = 2;
  int64 from_user_id = 3;
  int64 seq = 4;
  int32 msg_type = 5;
  string content = 6;
  string client_msg_id = 7;
}

message SendMessageRequest {
  int64 from_user_id = 1;
  string device_id = 2;
  string client_msg_id = 3;
  string conversation_id = 4;
  int32 conversation_type = 5;
  int64 to_user_id = 6;
  int32 msg_type = 7;
  string content = 8;
}

message SendMessageResponse {
  string client_msg_id = 1;
  int64 msg_id = 2;
  int64 seq = 3;
}

message ListMessagesRequest {
  string conversation_id = 1;
  int64 before_seq = 2;
  int32 limit = 3;
}

message ListMessagesResponse {
  repeated ChatMessage messages = 1;
}

message ListConversationsRequest {
  int64 user_id = 1;
}

message ConversationSummary {
  string conversation_id = 1;
  int32 type = 2;
  int64 last_seq = 3;
  int64 last_read_seq = 4;
  int64 unread_count = 5;
  string last_content = 6;
}

message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
}

message MarkReadRequest {
  int64 user_id = 1;
  string conversation_id = 2;
  int64 read_seq = 3;
}
